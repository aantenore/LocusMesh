name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          python-version: "3.12"
          enable-cache: true
          version: "0.11.21"
      - run: uv sync --locked --all-groups
      - run: >-
          uv export --locked --all-groups --no-emit-project --no-hashes
          --output-file /tmp/locusmesh-audit-requirements.txt
      - run: >-
          uv run pip-audit --strict
          --requirement /tmp/locusmesh-audit-requirements.txt

  quality:
    name: Quality (${{ matrix.os }}, Python ${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.12", "3.14"]
        include:
          - os: ubuntu-latest
            python: "3.13"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          python-version: ${{ matrix.python }}
          enable-cache: true
          version: "0.11.21"
      - run: uv sync --locked --all-groups
      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - run: uv run mypy src tests
      - run: uv run pytest

  package:
    name: Package smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          python-version: "3.12"
          enable-cache: true
          version: "0.11.21"
      - run: uv sync --locked --all-groups
      - run: uv build --no-build-isolation
      - run: uv venv --python 3.12 /tmp/locusmesh-smoke
      - run: uv pip install --python /tmp/locusmesh-smoke/bin/python dist/*.whl
      - run: cd /tmp && /tmp/locusmesh-smoke/bin/locusmesh --json doctor
      - run: cd /tmp && /tmp/locusmesh-smoke/bin/locusmesh --json demo
